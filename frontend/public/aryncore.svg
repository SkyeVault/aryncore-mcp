<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1535"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#7c6ef7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c6ef7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c6ef7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c6ef7"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="124" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.6"/>

  <!-- Orbit dots (persona nodes) -->
  <!-- central top -->
  <circle cx="128" cy="22" r="6" fill="#a78bfa" filter="url(#blur-glow)"/>
  <!-- doc right -->
  <circle cx="231" cy="168" r="5" fill="#3b82f6" filter="url(#blur-glow)"/>
  <!-- kona bottom-right -->
  <circle cx="192" cy="224" r="5" fill="#f472b6" filter="url(#blur-glow)"/>
  <!-- glyph bottom-left -->
  <circle cx="64" cy="224" r="5" fill="#5eead4" filter="url(#blur-glow)"/>
  <!-- estra left -->
  <circle cx="25" cy="168" r="5" fill="#fb923c" filter="url(#blur-glow)"/>

  <!-- Connector lines from center to orbit dots -->
  <line x1="128" y1="100" x2="128" y2="28" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <line x1="128" y1="100" x2="225" y2="163" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <line x1="128" y1="100" x2="187" y2="218" stroke="#f472b6" stroke-width="1" opacity="0.3"/>
  <line x1="128" y1="100" x2="69" y2="218" stroke="#5eead4" stroke-width="1" opacity="0.3"/>
  <line x1="128" y1="100" x2="31" y2="163" stroke="#fb923c" stroke-width="1" opacity="0.3"/>

  <!-- Inner hexagon ring -->
  <polygon points="128,58 168,80 168,124 128,146 88,124 88,80"
    fill="none" stroke="#7c6ef7" stroke-width="1.5" opacity="0.4"/>

  <!-- Core circle -->
  <circle cx="128" cy="102" r="38" fill="url(#core)" opacity="0.15"/>
  <circle cx="128" cy="102" r="38" fill="none" stroke="url(#ring)" stroke-width="2"/>

  <!-- A letterform (Aryn) -->
  <text x="128" y="122"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="52"
    font-weight="700"
    fill="url(#core)"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-2"
    filter="url(#blur-glow)">A</text>

  <!-- Label -->
  <text x="128" y="196"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="18"
    font-weight="600"
    fill="#c4b5fd"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.85">ARYNCORE</text>
</svg>
